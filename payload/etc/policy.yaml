# Ubuntu Zombie default policy.
#
# Action classes:
#   read_only       informational, never mutating; runs automatically.
#   user_change     changes within the agent user's own home.
#   system_change   package, service, file, or Docker mutation.
#   network_change  firewall, Tailscale, sshd, interface mutation.
#   destructive     irreversible mutation; requires confirmation phrase.
#
# Defaults are conservative. Operators may tighten or loosen per class.

settings:
  destructive_confirmation: "yes, I understand this is destructive"
  default_class: system_change  # used when no rule matches

classes:
  read_only:
    approval: auto
    description: Diagnostics and inspection only.
  user_change:
    approval: required
    description: Changes within the agent account's home directory or user-owned files.
  system_change:
    approval: required
    description: Package, service, file, or Docker mutation.
  network_change:
    approval: required
    description: Firewall, Tailscale, sshd, interface mutation.
  destructive:
    approval: required
    confirm_phrase: true
    description: Irreversible mutation. Requires confirmation phrase.

# Patterns are matched in order against the proposed command string.
# The first matching rule decides the class. Patterns are Python
# regular expressions, matched with re.search().
rules:
  # ----- destructive -----
  - pattern: '\brm\s+-rf\s+/'
    class: destructive
  - pattern: '\bmkfs(\.|\s)'
    class: destructive
  - pattern: '\bdd\b.*\bof=/dev/'
    class: destructive
  - pattern: '\buserdel\b'
    class: destructive
  - pattern: '\bshred\b'
    class: destructive
  - pattern: '\bdocker\s+(system\s+prune|volume\s+rm|image\s+prune\s+-a)'
    class: destructive
  - pattern: '>\s*/dev/sd[a-z]'
    class: destructive
  # FIX-3-03: ``find`` with -delete or -exec*/-ok* runs arbitrary
  # destructive commands; force the highest tier even if the operator
  # is impatient. Must precede any user_change/read_only rule for find.
  - pattern: '\bfind\b.*(-delete\b|-exec\b|-execdir\b|-ok\b|-okdir\b|-fprint\b|-fprintf\b|-fls\b)'
    class: destructive

  # ----- network_change -----
  - pattern: '\bufw\b'
    class: network_change
  - pattern: '\biptables\b'
    class: network_change
  - pattern: '\bnft\b'
    class: network_change
  - pattern: '\btailscale\s+(up|down|logout|set)'
    class: network_change
  - pattern: '\bip\s+(link|addr|route)\s+(set|add|del|change)'
    class: network_change
  - pattern: '\bsystemctl\s+(start|stop|restart|reload|enable|disable|mask|unmask)\s+(ssh|sshd|tailscaled|networking|systemd-networkd|NetworkManager)'
    class: network_change

  # ----- system_change -----
  - pattern: '\bapt(-get)?\s+(install|remove|purge|autoremove|upgrade|dist-upgrade)'
    class: system_change
  - pattern: '\bdpkg\s+(-i|--install|-r|--remove|-P|--purge)'
    class: system_change
  - pattern: '\bsnap\s+(install|remove|refresh)'
    class: system_change
  - pattern: '\bsystemctl\s+(start|stop|restart|reload|enable|disable|mask|unmask)\b'
    class: system_change
  - pattern: '\bservice\s+\S+\s+(start|stop|restart|reload)'
    class: system_change
  - pattern: '\bdocker\s+(run|start|stop|restart|rm|build|pull|push|exec)'
    class: system_change
  - pattern: '\busermod\b'
    class: system_change
  - pattern: '\bgroupadd\b'
    class: system_change
  - pattern: '\badduser\b'
    class: system_change
  - pattern: '\bchmod\b|\bchown\b|\bchgrp\b'
    class: system_change
  # FIX-3-26: ``git rm``/``git mv`` are user-level VCS operations; flag
  # them as user_change before the bare \brm\s+ / \bmv\s+ rules below
  # catch them as system_change. First match wins.
  - pattern: '\bgit\s+(rm|mv)\b'
    class: user_change
  - pattern: '\bmv\s+'
    class: system_change
  - pattern: '\brm\s+'
    class: system_change
  - pattern: '\bcp\s+.*\s+/etc/'
    class: system_change
  - pattern: '>\s*/etc/'
    class: system_change
  # Commands that execute an interpreter from a pipeline or through sudo
  # can run arbitrary mutating code even when the command starts with a
  # read-only tool such as `cat` or `grep`. Require approval before they
  # reach the shell.
  - pattern: '(\|\s*(sudo\s+)?|\bsudo\s+)(bash|sh|zsh|python[23]?|perl|ruby|node)\b'
    class: system_change
  # `tee` is commonly used to write privileged files from a pipeline and
  # otherwise mutates a file in place; classify before read_only tools.
  - pattern: '\btee\s+(-a\s+)?/(etc|usr|var|lib|boot|root)\b'
    class: system_change

  # ----- user_change -----
  - pattern: '\bgit\s+clone\b'
    class: user_change
  - pattern: '\bgit\s+(pull|fetch|checkout|reset)\b'
    class: user_change
  - pattern: '\bmkdir\b'
    class: user_change
  - pattern: '\btouch\b'
    class: user_change
  - pattern: '\bpip\s+install\b'
    class: user_change
  - pattern: '\bnpm\s+(install|i|add)\b'
    class: user_change
  # Pseudo-device targets like /dev/stderr and /dev/fd/2 write to an
  # existing stream, not persistent filesystem state.
  - pattern: '\btee\s+(-a\s+)?(?!/dev/(null|stdout|stderr|tty|fd/\d+)\b)\S+'
    class: user_change
  # Redirection to a real file mutates state even if the command head is
  # read-only (`grep x file > out`, `cat <<EOF > /tmp/x`, etc.). The
  # pattern matches optional fd prefixes plus `>`/`>>` writes (for
  # example `grep x > file.txt`); the negative lookbehind avoids heredoc
  # `<<`. The target allow-list permits fd duplication (`2>&1`) and
  # `/dev/null`, but not file writes.
  - pattern: '(?<!<)[0-9]*>>?\s*(?!&[0-9]\b|/dev/null\b)'
    class: user_change

  # ----- read_only -----
  # FIX-3-03: ``find`` removed from this read_only group. A ``find`` with
  # -delete or -exec*/-ok*/-fprint* is destructive (handled above);
  # safe ``find`` invocations are matched by the rule that follows.
  - pattern: '^(ls|cat|head|tail|less|file|stat|wc|grep|rg|ag)\b'
    class: read_only
  # FIX-3-03: ``find`` is read_only only when it does *not* contain any
  # of the side-effecting flags. Approval flow still applies otherwise.
  - pattern: '^find\b(?!.*(-delete\b|-exec\b|-execdir\b|-ok\b|-okdir\b|-fprint\b|-fprintf\b|-fls\b))'
    class: read_only
  - pattern: '^(df|du|free|uptime|uname|hostname|id|whoami|w|who|pwd|date)\b'
    class: read_only
  - pattern: '^(ps|top|htop)\b'
    class: read_only
  - pattern: '^(systemctl\s+(status|is-active|is-enabled|list-units|show)|journalctl\b)'
    class: read_only
  - pattern: '^(ip\s+(a|addr|link)\s*(show)?|ss\b|netstat\b|ping\b|dig\b|host\b|nslookup\b)'
    class: read_only
  - pattern: '^(apt\s+list|apt-cache\s+(search|show|policy)|dpkg\s+-l|dpkg\s+-s)'
    class: read_only
  - pattern: '^(docker\s+(ps|images|info|version|logs|inspect|stats)|tailscale\s+status|ufw\s+status)'
    class: read_only
  - pattern: '^(git\s+(status|log|diff|show|branch|remote))'
    class: read_only
  - pattern: '^(env|printenv|which|type|command\s+-v)'
    class: read_only
