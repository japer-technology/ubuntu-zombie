name: Integration

# Exercise the installer outside the lint sandbox so behaviour-changing
# regressions in scripts/install.sh are caught before they reach an
# operator's machine. Runs nightly and on demand. We deliberately do
# NOT block CI on this workflow — Docker cannot represent every
# systemd/Tailscale interaction a real Ubuntu Desktop host can — but a
# red run is a strong signal that something on the install path broke.

on:
  workflow_dispatch:
  schedule:
    - cron: "13 4 * * *"   # nightly at 04:13 UTC

permissions:
  contents: read

jobs:
  dry-run:
    name: install.sh --dry-run on host runner
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-22.04
            label: "22.04"
          - runs-on: ubuntu-24.04
            label: "24.04"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: install.sh --dry-run (Ubuntu ${{ matrix.label }})
        env:
          ZOMBIE_NONINTERACTIVE: "1"
          ZOMBIE_SKIP_TAILSCALE: "1"
          SSH_PUBLIC_KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBYxDeIaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa ci@example"
          VNC_PASSWORD: "ci-dummy-vnc-password"
        run: sudo -E ./scripts/install.sh install --dry-run

  install-in-container:
    # Best-effort: install in an Ubuntu container with systemd disabled.
    # Any step that strictly requires systemd or a live display will be
    # tolerated but logged. The script's idempotency and validation
    # paths are the primary signal we care about.
    name: install/verify/uninstall in container (Ubuntu ${{ matrix.label }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: "ubuntu:22.04"
            label: "22.04"
          - image: "ubuntu:24.04"
            label: "24.04"
    container:
      image: ${{ matrix.image }}
      options: --privileged
    steps:
      - name: Bootstrap container
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git sudo systemctl bash \
            python3 python3-pip shellcheck
          # GitHub-hosted container jobs run as root; that's what the
          # installer expects anyway.

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Smoke (must pass in container too)
        run: bash tests/smoke.sh all

      - name: install.sh --dry-run (full plan)
        env:
          ZOMBIE_NONINTERACTIVE: "1"
          ZOMBIE_SKIP_TAILSCALE: "1"
          SSH_PUBLIC_KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBYxDeIaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa ci@example"
          VNC_PASSWORD: "ci-dummy-vnc-password"
        run: ./scripts/install.sh install --dry-run
