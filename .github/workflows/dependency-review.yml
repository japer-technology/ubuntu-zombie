name: Dependency Review

# Flags PRs that introduce dependencies with known vulnerabilities or
# incompatible licenses. Ubuntu Zombie has very few build-time
# dependencies, but the agent payload pulls in npm and pip packages at
# install-time, and dependency review covers any manifests that land in
# the repo (e.g. `package.json`, `requirements*.txt`, `pyproject.toml`).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # MIT-aligned allow-list. Tighten if a non-permissive dep
          # sneaks in via a payload manifest.
          allow-licenses: >-
            0BSD, Apache-2.0, BSD-2-Clause, BSD-3-Clause,
            CC0-1.0, ISC, MIT, MPL-2.0, Python-2.0, Unlicense, Zlib
